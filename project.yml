name: RioAgent
options:
  bundleIdPrefix: com.rioagent
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true

targets:
  RioAgent:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Views
      - path: ViewModels
      - path: Agent
      - path: Services
      - path: Tools
      - path: Models
      - path: Utils
      - path: Theme
    info:
      path: Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rioagent.app
        PRODUCT_NAME: "Rio Agent"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: RioAgent.entitlements
        ENABLE_HARDENED_RUNTIME: "NO"
